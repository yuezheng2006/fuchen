# xcodegen spec — single source of truth for the Burrow Xcode project.
# Regenerate with `xcodegen generate`. The .xcodeproj is gitignored so
# diffs stay readable; the spec is small and stable.
name: Burrow
options:
  bundleIdPrefix: dev.caezium
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    # Unsigned dev builds. Distribution config gets added later.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    DEAD_CODE_STRIPPING: YES

targets:
  Burrow:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        excludes: ["Info.plist", "Burrow.entitlements"]
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations: [zh-Hans, en]
        LSUIElement: true   # menu-bar agent, no Dock icon
        CFBundleDisplayName: Burrow
        CFBundleShortVersionString: "0.5.1"
        CFBundleVersion: "3"
        NSHumanReadableCopyright: "MIT License. Mole CLI © tw93. Independent, not affiliated with mole.fit."
    entitlements:
      path: Resources/Burrow.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.caezium.Burrow
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []

  BurrowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    info:
      path: Tests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.caezium.BurrowTests
    dependencies:
      - target: Burrow
