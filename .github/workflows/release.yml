name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install mole
        run: brew install mole

      - name: Import signing certificate
        if: ${{ secrets.CODESIGN_CERT_P12 != '' }}
        env:
          CODESIGN_CERT_P12: ${{ secrets.CODESIGN_CERT_P12 }}
          CODESIGN_CERT_PASSWORD: ${{ secrets.CODESIGN_CERT_PASSWORD }}
        run: |
          echo "$CODESIGN_CERT_P12" | base64 --decode > build/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import build/cert.p12 -k build.keychain -P "$CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          echo "CODESIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -1)" >> "$GITHUB_ENV"

      - name: Build release
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/release-swiftc.sh

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)
          gh release create "v${VERSION}" \
            dist/Burrow-${VERSION}.zip \
            dist/Burrow-${VERSION}.dmg \
            --title "Burrow ${VERSION}" \
            --notes-file RELEASES.md
